name:                purekell
version:             0.1.0.0
synopsis:            Bidirectional Haskell/PureScript expression translator
description:         Parses Haskell and PureScript expressions into a shared AST, then prints them back in either language with correct syntax. Handles divergent syntax like record access, tuples, cons patterns, and record field separators. Designed for translating typeclass instance method bodies.
license:             Apache-2.0
author:              philippedev101
maintainer:          philippedev101
copyright:           2026 philippedev101
category:            Language
extra-source-files:
- README.md
- CHANGELOG.md

language: GHC2021

default-extensions:
- DerivingVia
- LambdaCase
- OverloadedStrings

dependencies:
- base >= 4.7 && < 5
- text >= 2.0 && < 2.2
- megaparsec >= 9.0 && < 9.8

ghc-options:
- -Weverything
- -Werror
- -Wno-unrecognised-warning-flags
# Not useful for this project
- -Wno-missing-safe-haskell-mode
- -Wno-safe
- -Wno-unsafe
- -Wno-implicit-prelude
- -Wno-missing-import-lists
- -Wno-missing-local-signatures
- -Wno-missing-kind-signatures
- -Wno-missing-deriving-strategies
- -Wno-missing-export-lists
- -Wno-missing-role-annotations
- -Wno-prepositive-qualified-module
- -Wno-unticked-promoted-constructors
# Intentional in this codebase
- -Wno-orphans
- -Wno-name-shadowing
- -Wno-unused-imports
- -Wno-monomorphism-restriction
- -Wno-type-defaults
- -Wno-deprecations
# Not actionable
- -Wno-missed-specialisations
- -Wno-all-missed-specialisations

library:
  source-dirs: src
  exposed-modules:
  - Purekell
  - Purekell.AST
  - Purekell.Codec
  - Purekell.Haskell
  - Purekell.Parser
  - Purekell.Printer
  - Purekell.PureScript
  - Purekell.Instance

tests:
  purekell-test:
    main: Spec.hs
    source-dirs: test
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    - -Wno-unused-packages
    build-tools:
    - hspec-discover
    dependencies:
    - purekell
    - hspec
    - QuickCheck

github: philippedev101/purekell
